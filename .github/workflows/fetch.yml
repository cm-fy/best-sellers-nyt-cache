name: Fetch NYT Best Sellers

on:
  schedule:
    # Run every Thursday at 00:30 UTC (lists publish ~7pm ET Wednesday)
    - cron: '30 0 * * 4'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pages: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch overview and split into per-list JSON
        env:
          NYT_API_KEY: ${{ secrets.NYT_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p nyt

          # Fetch the overview (all lists in one call)
          OVERVIEW=$(curl -sS \
            "https://api.nytimes.com/svc/books/v3/lists/overview.json?api-key=${NYT_API_KEY}")

          STATUS=$(echo "$OVERVIEW" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))")
          if [ "$STATUS" != "OK" ]; then
            echo "NYT API returned status: $STATUS" >&2
            exit 1
          fi

          # Save the full overview
          echo "$OVERVIEW" | python3 -c "
          import sys, json, os
          data = json.load(sys.stdin)
          published = data.get('results', {}).get('published_date', 'unknown')
          # Write overview
          with open('nyt/overview.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          # Write per-list files
          for lst in data.get('results', {}).get('lists', []):
              slug = lst.get('list_name_encoded', '')
              if slug:
                  with open(f'nyt/{slug}.json', 'w', encoding='utf-8') as f:
                      json.dump(lst, f, ensure_ascii=False, indent=2)
          # Write metadata
          meta = {
              'published_date': published,
              'fetched_at': data.get('results', {}).get('bestsellers_date', ''),
              'list_count': len(data.get('results', {}).get('lists', [])),
              'lists': [
                  {
                      'slug': l.get('list_name_encoded', ''),
                      'display_name': l.get('display_name', ''),
                      'updated': l.get('updated', ''),
                      'book_count': len(l.get('books', []))
                  }
                  for l in data.get('results', {}).get('lists', [])
              ]
          }
          with open('nyt/meta.json', 'w', encoding='utf-8') as f:
              json.dump(meta, f, ensure_ascii=False, indent=2)
          print(f'Published date: {published}')
          print(f'Lists written: {meta[\"list_count\"]}')
          "

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A nyt/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update NYT bestseller cache $(date -u +%Y-%m-%d)"
            git push
          fi
